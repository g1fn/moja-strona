<!DOCTYPE html>
<html lang="pl">
<head>

        .container {
            max-width: 700px;
            margin: auto;
        }

        h1 {
            color: #2c3e50;

        }

            padding: 12px 25px;
            background: #3498db;
            color: white;
            text-decoration: none;
            border-radius: 8px;
            font-weight: bold;
            transition: 0.2s;
        }

        .btn:hover {

        }
